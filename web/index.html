<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-Age-Compatible">
  <meta name="description" content="ParkPlace - Find and book parking spaces">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ParkPlace">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>ParkPlace</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Unregister any old service workers so new builds take effect immediately
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) { reg.unregister(); }
      });
    }
  </script>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
